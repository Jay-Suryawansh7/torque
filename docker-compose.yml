services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - torque_data:/app/data
    environment:
      - PORT=8000
      - DATA_DIR=./data
    command: npx tsx src/index.ts

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  torque_data:
